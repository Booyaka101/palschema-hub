# Keeps items.json (per-item VALUES for DT_ItemDataTable, shown by items.html)
# in sync with the upstream paldex DataTable dump.
#
# build-items.mjs fetches the public dump and rewrites items.json. pages.yml
# only copies the COMMITTED items.json, so without this the file goes stale
# until someone runs the script by hand. This runs it on a schedule and opens
# a PR only when the item DATA actually changed (the generatedAt timestamp
# alone never triggers one).
name: refresh-items

on:
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Snapshot the committed file BEFORE regenerating. Reading two plain
      # files avoids `git show` through execSync, whose 1 MB default maxBuffer
      # is smaller than items.json (~1.08 MB) — that threw ENOBUFS and made the
      # change-check always report "changed", opening a noise PR every run.
      - name: Snapshot committed items.json (pre-refresh)
        run: '[ -f items.json ] && cp items.json "$RUNNER_TEMP/items.old.json" || echo "no committed items.json yet"'

      - name: Regenerate items.json from the paldex dump
        run: node scripts/build-items.mjs

      - name: Detect a meaningful change (ignore generatedAt)
        id: diff
        run: |
          node -e '
            const fs = require("fs");
            const strip = (o) => { const { generatedAt, ...rest } = o; return rest; };
            const oldPath = process.env.RUNNER_TEMP + "/items.old.json";
            let changed = true;
            try {
              if (fs.existsSync(oldPath)) {
                const old = JSON.parse(fs.readFileSync(oldPath, "utf8"));
                const neu = JSON.parse(fs.readFileSync("items.json", "utf8"));
                changed = JSON.stringify(strip(old)) !== JSON.stringify(strip(neu));
              } // else: no prior committed file → treat as changed
            } catch (e) {
              changed = true; // unreadable → treat as changed
            }
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `changed=${changed}\n`);
            console.log("meaningful change:", changed);
          '

      - name: Open a PR with the refreshed catalog
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          branch="items-refresh-$(date -u +%Y%m%d%H%M%S)"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add items.json
          git commit -m "chore: refresh items.json from paldex dump"
          git push origin "$branch"
          count=$(node -e 'process.stdout.write(String(JSON.parse(require("fs").readFileSync("items.json","utf8")).count))')
          gh pr create \
            --base main \
            --head "$branch" \
            --title "chore: refresh items.json ($count items) from paldex" \
            --body $'Automated weekly refresh of `items.json` (per-item values for `DT_ItemDataTable`, shown by items.html).\n\nRegenerated by `scripts/build-items.mjs` from the upstream paldex DataTable dump. Opened only because the item data changed (the `generatedAt` timestamp alone does not trigger a PR). Review the diff and merge to redeploy the catalog via Pages.'
